<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다모여 — 대학생 프로젝트 매칭·협업 플랫폼</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/resources/css/style.css">
</head>
<body>
  <jsp:include page="/WEB-INF/views/includes/header.jsp" />


<main>
  <!-- 초기 HTML/자바스크립트 -->
  
</main>

<!-- ===== 팀원 업무 상세 모달 ===== -->
<div class="modal-overlay" id="memberModal" onclick="if(event.target===this)closeMember()">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mmName">
    <div class="modal-head">
      <span class="pic" id="mmPic"></span>
      <div class="mh-info"><h3 id="mmName"></h3><div class="role" id="mmRole"></div></div>
      <button class="modal-close" onclick="closeMember()" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-stats" id="mmStats"></div>
      <div class="sec-label" style="margin-top:0">담당 업무</div>
      <div id="mmTasks"></div>
    </div>
  </div>
</div>

<!-- ===== 결과물 제출 모달 ===== -->
<div class="modal-overlay" id="submitModal" onclick="if(event.target===this)closeSubmit()">
  <div class="modal form-modal" role="dialog" aria-modal="true" aria-labelledby="smTitle">
    <div class="modal-head">
      <div class="mh-info"><h3 id="smTitle">결과물 제출</h3><div class="role">담당한 업무의 결과물을 제출해요</div></div>
      <button class="modal-close" onclick="closeSubmit()" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="submitBody">
      <div class="sm-task">
        <div class="k">제출 업무</div>
        <div class="v" id="smTaskName">매칭 검색 필터 구현</div>
        <div class="due" id="smTaskDue">마감 08.15</div>
      </div>

      <div class="fld">
        <label>결과물 파일</label>
        <div class="dropzone" id="dropzone" onclick="pickFile()">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
          <div class="dz-main">파일을 끌어다 놓거나 클릭해서 업로드</div>
          <div class="dz-sub">파일 또는 텍스트로 제출할 수 있어요 (최대 50MB)</div>
        </div>
        <div id="dzFileWrap"></div>
      </div>

      <div class="fld one">
        <label>제출 설명 <span style="color:var(--ink-soft);font-weight:500">(선택)</span></label>
        <textarea placeholder="무엇을 구현했는지, 확인할 점이 있는지 팀장에게 남겨주세요." style="min-height:80px"></textarea>
      </div>
      <div class="fld one">
        <label>참고 링크 <span style="color:var(--ink-soft);font-weight:500">(선택)</span></label>
        <input type="text" placeholder="GitHub·Figma 등 링크">
      </div>

      <div class="form-foot">
        <button class="btn ghost" onclick="closeSubmit()">취소</button>
        <button class="btn pri" onclick="doSubmit()">제출하기</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== 업무 상세 + 검수 모달 ===== -->
<div class="modal-overlay" id="taskModal" onclick="if(event.target===this)closeTask()">
  <div class="modal form-modal" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle">
    <div class="modal-head">
      <div class="mh-info"><h3 id="taskModalTitle"></h3><div class="role">업무 상세</div></div>
      <button class="modal-close" onclick="closeTask()" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="taskModalBody"></div>
  </div>
</div>

<!-- ===== 함께하기 제의 모달 ===== -->
<div class="modal-overlay" id="offerModal" onclick="if(event.target===this)closeOffer()">
  <div class="modal form-modal" role="dialog" aria-modal="true" aria-labelledby="offerTitle">
    <div class="modal-head">
      <div class="mh-info"><h3 id="offerTitle">함께하기 제의</h3><div class="role" id="offerWho">상대에게 초대를 보내요</div></div>
      <button class="modal-close" onclick="closeOffer()" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="offerBody">
      <div class="offer-proj">
        <div class="k">초대할 프로젝트</div>
        <select id="offerProj">
          <option>AI 헬스케어 웹서비스 (팀장)</option>
          <option>데이터베이스 텀 프로젝트</option>
        </select>
      </div>
      <div class="fld one"><label>맡아줬으면 하는 역할</label><input type="text" id="offerRole" placeholder="예: 백엔드 · 인증/권한"></div>
      <div class="fld one"><label>제의 메시지</label><textarea placeholder="왜 함께하고 싶은지, 어떤 점이 좋았는지 적어주세요." style="min-height:90px"></textarea></div>
      <div class="form-foot">
        <button class="btn ghost" onclick="closeOffer()">취소</button>
        <button class="btn pri" onclick="sendOffer()">제의 보내기</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== 프로필 수정 모달 ===== -->
<div class="modal-overlay" id="profileModal" onclick="if(event.target===this)closeProfile()">
  <div class="modal form-modal" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
    <div class="modal-head">
      <div class="mh-info"><h3 id="profileTitle">프로필 수정</h3><div class="role">다른 사람에게 보이는 내 정보예요</div></div>
      <button class="modal-close" onclick="closeProfile()" aria-label="닫기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body" id="profileBody">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
        <span class="big" style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#2b46c8,#5b45c8);color:#fff;display:grid;place-items:center;font-size:22px;font-weight:800;flex:none">민</span>
        <button class="btn ghost sm">사진 변경</button>
      </div>
      <div class="fld one"><label>이름</label><input type="text" id="pfName" value="김민재"></div>
      <div class="frow">
        <div class="fld"><label>학과</label>
          <select id="pfDept"><option selected>컴퓨터공학과</option><option>소프트웨어학과</option><option>산업경영공학과</option><option>게임공학과</option></select>
        </div>
        <div class="fld"><label>학년</label>
          <select id="pfYear"><option>1학년</option><option>2학년</option><option>3학년</option><option selected>4학년</option><option>5학년 이상</option></select>
        </div>
      </div>
      <div class="frow">
        <div class="fld"><label>주전공</label><input type="text" id="pfMajor" value="컴퓨터공학"></div>
        <div class="fld"><label>복수전공 <span style="color:var(--ink-soft);font-weight:500">(선택)</span></label><input type="text" id="pfMinor" placeholder="없으면 비워두세요"></div>
      </div>
      <div class="fld one">
        <label>관심 분야</label>
        <div class="picker" id="pfInterests">
          <input type="checkbox" id="pf1" checked><label for="pf1">백엔드</label>
          <input type="checkbox" id="pf2"><label for="pf2">프론트엔드</label>
          <input type="checkbox" id="pf3" checked><label for="pf3">데이터</label>
          <input type="checkbox" id="pf4"><label for="pf4">AI</label>
          <input type="checkbox" id="pf5"><label for="pf5">기획</label>
          <input type="checkbox" id="pf6"><label for="pf6">디자인</label>
          <input type="checkbox" id="pf7"><label for="pf7">게임</label>
        </div>
      </div>
      <div class="fld one"><label>한 줄 소개 <span style="color:var(--ink-soft);font-weight:500">(선택)</span></label><input type="text" id="pfBio" placeholder="예: Spring 백엔드에 관심 많은 4학년"></div>
      <div class="form-foot">
        <button class="btn ghost" onclick="closeProfile()">취소</button>
        <button class="btn pri" onclick="saveProfile()">저장하기</button>
      </div>
    </div>
  </div>
</div>



<script>
  // ----- 뷰 전환 -----
  const views = {home:'v-home',match:'v-match',detail:'v-detail',talent:'v-talent',talentdetail:'v-talentdetail',talentpost:'v-talentpost',myprojects:'v-myprojects',overview:'v-overview',tasks:'v-tasks',mypage:'v-mypage',admin:'v-admin',login:'v-login',signup:'v-signup',create:'v-create',feedback:'v-feedback',accounts:'v-accounts',posts:'v-posts',taskform:'v-taskform',schedule:'v-schedule',meetings:'v-meetings',meetingform:'v-meetingform',org:'v-org',applicants:'v-applicants',results:'v-results',complete:'v-complete'};
  function go(v){
    Object.values(views).forEach(id=>document.getElementById(id).classList.remove('on'));
    document.getElementById(views[v]).classList.add('on');
    document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
    window.scrollTo({top:0,behavior:'smooth'});
  }
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.v));

  // ----- 매칭 카드 데이터 -----
  const CAT={공모전:{c:'var(--cat-contest)'},학과:{c:'var(--cat-major)'},교양:{c:'var(--cat-liberal)'},교내활동:{c:'var(--cat-club)'}};
  const projects=[
    {cat:'공모전',scope:'교내',title:'2026 캡스톤 경진대회 — AI 헬스케어 웹서비스',desc:'학생 건강 관리를 돕는 AI 기반 웹서비스를 함께 만들 팀원을 찾습니다.',dept:'컴퓨터공학',year:'3–4학년',have:2,need:4,tags:['Spring','React','MySQL'],dday:'D-9'},
    {cat:'학과',scope:'학과',title:'데이터베이스 텀 프로젝트 팀원 구해요',desc:'ERD 설계부터 구현까지. DB 수업 텀 프로젝트를 같이 할 3명을 모집합니다.',dept:'컴퓨터공학',year:'3학년',have:1,need:3,tags:['MySQL','ERD'],dday:'D-4'},
    {cat:'교양',scope:'교내',title:'교양 〈창업과 경영〉 발표 조원 모집',desc:'중간·기말 발표를 함께 준비할 조원을 찾습니다. 부담 없는 팀플이에요.',dept:'전체',year:'전 학년',have:3,need:5,tags:['발표','기획'],dday:'D-6'},
    {cat:'교내활동',scope:'전국',title:'전국 대학생 연합 해커톤 참가팀',desc:'48시간 해커톤에 나갈 연합팀을 꾸립니다. 학교 무관, 실력·열정 환영.',dept:'무관',year:'무관',have:3,need:6,tags:['해커톤','Node','AI'],dday:'D-12'},
    {cat:'공모전',scope:'전국',title:'ESG 아이디어 공모전 — 기획·개발 파트너',desc:'친환경 서비스 아이디어를 서비스로 구현할 개발자를 찾습니다.',dept:'무관',year:'2–4학년',have:2,need:4,tags:['기획','Spring'],dday:'D-15'},
    {cat:'학과',scope:'교내',title:'졸업작품 — Unity 게임 개발 팀원',desc:'카드 전략 RPG 졸업작품을 함께 완성할 클라이언트·기획 팀원 모집.',dept:'게임공학',year:'4학년',have:2,need:3,tags:['Unity','C#'],dday:'D-3'},
  ];
  document.getElementById('cards').innerHTML=projects.map(p=>`
    <article class="card" style="--c:${CAT[p.cat].c}" onclick="go('detail')" tabindex="0" onkeydown="if(event.key==='Enter')go('detail')">
      <div class="row1"><span class="cat">${p.cat} · ${p.scope}</span><span class="chip recruit">모집중</span></div>
      <h4>${p.title}</h4>
      <p>${p.desc}</p>
      <div class="meta"><span>${p.dept}</span><span>${p.year}</span></div>
      <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="card-foot"><span class="team-need">모집 <b class="mono" style="color:var(--ink)">${p.have}/${p.need}</b>명</span><span class="dday">${p.dday}</span></div>
    </article>`).join('');

  // ----- 업무 보드 (칸반) -----
  const MYID=1; // 데모: 로그인 사용자 = 김민재(팀원 인덱스 1)
  let boardFilter='all';
  const MEM=[{n:'이도현',c:'#2b46c8',i:'이'},{n:'김민재',c:'#2b46c8',i:'민'},{n:'서지우',c:'#0f9d8c',i:'서'},{n:'최윤서',c:'#c98a12',i:'최'}];
  const COLS=[
    {key:'등록',label:'등록',cc:'var(--grey)',chip:'done'},
    {key:'진행중',label:'진행중',cc:'var(--accent)',chip:'ing'},
    {key:'검수대기',label:'제출·검수 대기',cc:'var(--wait)',chip:'wait'},
    {key:'승인',label:'승인 완료',cc:'var(--ok)',chip:'approve'}
  ];
  let TASKS=[
    {id:1,t:'로그인·회원 인증 구현',d:'Spring Security 세션 인증',who:0,due:'08.12',status:'등록'},
    {id:2,t:'관리자 통계 화면',d:'집계 쿼리 + 대시보드',who:1,due:'08.20',status:'등록'},
    {id:3,t:'매칭 검색 필터 구현',d:'카테고리·학과·학년 동적 쿼리',who:1,due:'08.15',soon:1,status:'진행중'},
    {id:4,t:'신고·계정 관리 API',d:'관리자 기능',who:0,due:'08.22',status:'진행중'},
    {id:5,t:'ERD·DB 스키마 설계',d:'5개 핵심 테이블 + 참여/신고 관계까지 반영했습니다. 정규화 검토 부탁드려요.',who:0,due:'08.10',soon:1,status:'검수대기',file:['erd_schema_v2.pdf','1.4MB'],submittedAt:'08.10 제출'},
    {id:6,t:'지원·승인 API',d:'면접→승인 트랜잭션. 정원 초과 동시 요청은 비관적 락으로 막았고 테스트 코드 포함했습니다.',who:1,due:'08.14',status:'검수대기',file:['recruit_api.zip','320KB'],submittedAt:'08.13 제출'},
    {id:7,t:'화면 설계 (Figma)',d:'전체 15개 화면 와이어프레임입니다.',who:2,due:'08.08',status:'승인',file:['wireframe.fig','2.1MB'],submittedAt:'08.08 제출'},
    {id:8,t:'개발 환경 세팅',d:'Tomcat · Maven · Git',who:1,due:'08.07',status:'승인'},
    {id:9,t:'요구사항 정의서',d:'기능 명세서',who:3,due:'08.06',status:'승인',file:['requirements_v2.docx','92KB'],submittedAt:'08.06 제출'},
    {id:10,t:'회원 도메인 설계',d:'엔티티·매퍼 구조',who:0,due:'08.05',status:'승인'},
    {id:11,t:'프로젝트 CRUD API',d:'모집 등록·수정·조회',who:1,due:'08.09',status:'승인'},
    {id:12,t:'공통 레이아웃·헤더',d:'JSP 공통 화면',who:2,due:'08.05',status:'승인'},
    {id:13,t:'DB 초기 스키마 반영',d:'테이블 생성 스크립트',who:0,due:'08.04',status:'승인'}
  ];
  const APPROVED_LIMIT=5;
  let taskSearch='', approvedExpanded=false;
  function taskMatch(t,q){ return !q || (t.t+' '+(t.d||'')+' '+MEM[t.who].n).toLowerCase().includes(q); }
  function renderKanban(){
    const q=taskSearch.trim().toLowerCase();
    let src=boardFilter==='mine'?TASKS.filter(t=>t.who===MYID):TASKS;
    src=src.filter(t=>taskMatch(t,q));
    document.getElementById('kanban').innerHTML=COLS.map(c=>{
      let items=src.filter(t=>t.status===c.key);
      const total=items.length;
      let extra='';
      if(c.key==='승인' && !q && !approvedExpanded && total>APPROVED_LIMIT){
        items=items.slice(0,APPROVED_LIMIT);
        extra=`<button class="col-more" onclick="expandApproved()">지난 완료 ${total-APPROVED_LIMIT}개 더보기</button>`;
      } else if(c.key==='승인' && approvedExpanded && !q && total>APPROVED_LIMIT){
        extra=`<button class="col-more" onclick="collapseApproved()">완료 칸 접기</button>`;
      }
      return `<div class="col">
        <div class="col-h" style="--cc:${c.cc}">
          <div class="t"><span class="chip ${c.chip}">${c.label}</span></div>
          <div class="cnt">${total}</div>
        </div>
        ${items.map(t=>`
          <div class="task" onclick="openTask(${t.id})">
            <h5>${t.t}</h5><p>${t.d}</p>
            ${t.rejected?'<span class="chip reject" style="margin-bottom:8px">반려 · 재작업 필요</span>':''}
            <div class="task-foot">
              <span class="who-mini"><span class="pic" style="background:${MEM[t.who].c}">${MEM[t.who].i}</span>${MEM[t.who].n}</span>
              <span class="due${t.soon?' soon':''}">~${t.due}</span>
            </div>
          </div>`).join('')}
        ${extra}
        ${total===0?'<p class="col-empty">'+(q?'검색 결과 없음':'없음')+'</p>':''}
      </div>`;
    }).join('');
  }
  window.onTaskSearch=(v)=>{ taskSearch=v; approvedExpanded=false; renderKanban(); };
  window.expandApproved=()=>{ approvedExpanded=true; renderKanban(); };
  window.collapseApproved=()=>{ approvedExpanded=false; renderKanban(); };
  renderKanban();

  // ----- 업무 보드 토글 (전체/내업무/팀현황) -----
  document.querySelectorAll('#taskToggle button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#taskToggle button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const p=b.dataset.p, team=p==='team';
    document.getElementById('boardPanel').style.display=team?'none':'';
    document.getElementById('teamPanel').style.display=team?'':'none';
    document.getElementById('boardTools').style.display=team?'none':'';
    if(!team){ boardFilter=p; renderKanban(); }
  });

  // ----- 마이페이지 탭 -----
  const CATC={공모전:'var(--cat-contest)',학과:'var(--cat-major)',교양:'var(--cat-liberal)',교내활동:'var(--cat-club)'};

  }

  function sendOffer(){
    const t=TALENT[curTalent];
    const role=(document.getElementById('offerRole').value||'').trim()||t.field;
    SENT_OFFERS.unshift({name:t.name,pic:t.pic,c:t.c,role,status:'대기'});
    renderSentOffers();
    document.getElementById('offerBody').innerHTML=`
      <div class="submit-success">
        <div class="ok-ic"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
        <h3>제의를 보냈어요!</h3>
        <p>${t.name}님에게 함께하기 제의가 전달됐어요.<br>상대가 <b>수락</b>하면 팀원으로 합류해요. 보낸 제의는 <b>팀원 관리</b>에서 확인할 수 있어요.</p>
        <button class="btn pri" style="margin-top:20px" onclick="closeOffer()">확인</button>
      </div>`;
  }
  window.openOffer=openOffer; window.closeOffer=closeOffer; window.sendOffer=sendOffer;
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOffer();});
  const CATCLR={공모전:'#2b46c8',학과:'#0f9d8c',교양:'#e07a45',교내활동:'#8256e0'};
  const posts=[
    {title:'2026 캡스톤 경진대회 — AI 헬스케어 웹서비스',cat:'공모전',author:'최윤서',date:'08.03',reports:0,status:'게시중'},
    {title:'데이터베이스 텀 프로젝트 팀원 구해요',cat:'학과',author:'정하람',date:'08.05',reports:0,status:'게시중'},
    {title:'전국 대학생 연합 해커톤 참가팀',cat:'교내활동',author:'김상우',date:'08.02',reports:2,status:'게시중'},
    {title:'교양 〈창업과 경영〉 발표 조원 모집',cat:'교양',author:'박서연',date:'08.06',reports:0,status:'게시중'},
    {title:'[급구] 상금 나눠요 아무나 지원 ㄱㄱ',cat:'공모전',author:'user_2201',date:'08.04',reports:1,status:'숨김'},
    {title:'졸업작품 — Unity 게임 개발 팀원',cat:'학과',author:'오세훈',date:'08.01',reports:0,status:'게시중'},
  ];
  const PSTAT={게시중:'approve',숨김:'wait',삭제:'reject'};
  let postFilter='all';
  function postActions(p,i){
    if(p.status==='게시중') return `<button class="btn sm ghost" onclick="setPost(${i},'숨김')">숨김</button><button class="btn sm ghost" onclick="setPost(${i},'삭제')" style="color:var(--reject)">삭제</button>`;
    if(p.status==='숨김') return `<button class="btn sm pri" onclick="setPost(${i},'게시중')">복원</button><button class="btn sm ghost" onclick="setPost(${i},'삭제')" style="color:var(--reject)">삭제</button>`;
    return `<button class="btn sm pri" onclick="setPost(${i},'게시중')">복원</button>`;
  }
  function renderPosts(){
    const rows=posts.map((p,i)=>({p,i})).filter(({p})=>
      postFilter==='all'?true:postFilter==='reported'?p.reports>0:(p.status==='숨김'||p.status==='삭제'));
    document.getElementById('postTable').innerHTML=
      '<tr><th>게시물</th><th>작성자</th><th>게시일</th><th>신고</th><th>상태</th><th>관리</th></tr>'+
      rows.map(({p,i})=>`<tr${(p.status!=='게시중')?' style="opacity:.65"':''}>
        <td><div class="nm" style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:2px;background:${CATCLR[p.cat]};flex:none"></span>${p.title}</div><div class="mono" style="font-size:11px;color:var(--ink-soft);margin-left:16px">${p.cat}</div></td>
        <td><div class="mono">${p.author}</div></td>
        <td><div class="mono">08.${p.date.split('.')[1]}</div></td>
        <td>${p.reports>0?`<span class="chip reject">${p.reports}</span>`:'<span style="color:var(--ink-soft)">—</span>'}</td>
        <td><span class="chip ${PSTAT[p.status]}">${p.status}</span></td>
        <td><div class="act-btns">${postActions(p,i)}</div></td>
      </tr>`).join('');
    // 탭 카운트
    const cAll=posts.length, cRep=posts.filter(p=>p.reports>0).length, cHid=posts.filter(p=>p.status!=='게시중').length;
    const tb=document.querySelectorAll('#postTabs button');
    tb[0].querySelector('.mono').textContent=cAll;
    tb[1].querySelector('.mono').textContent=cRep;
    tb[2].querySelector('.mono').textContent=cHid;
  }
  window.setPost=(i,st)=>{posts[i].status=st;renderPosts();};
  document.querySelectorAll('#postTabs button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#postTabs button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); postFilter=b.dataset.f; renderPosts();
  });
  renderPosts();

  // ----- 결과물 제출 모달 -----
  const submitFormHTML=document.getElementById('submitBody').innerHTML;
  const fileIconSvg='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
  function openSubmit(name,due){
    document.getElementById('submitBody').innerHTML=submitFormHTML; // 폼 복원
    if(name) document.getElementById('smTaskName').textContent=name;
    document.getElementById('smTaskDue').textContent='마감 '+(due||'08.15');
    document.getElementById('submitModal').classList.add('on');
    document.body.style.overflow='hidden';
  }
  function closeSubmit(){
    document.getElementById('submitModal').classList.remove('on');
    document.body.style.overflow='';
  }
  function pickFile(){
    // 데모: 파일 선택된 것처럼 표시
    document.getElementById('dropzone').style.display='none';
    document.getElementById('dzFileWrap').innerHTML=`
      <div class="dz-file">
        <span class="fi">${fileIconSvg}</span>
        <div class="fmeta"><div class="fn">search_filter.zip</div><div class="fs">280KB</div></div>
        <span class="rm" onclick="removeFile()" title="제거">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </span>
      </div>`;
  }
  function removeFile(){
    document.getElementById('dzFileWrap').innerHTML='';
    document.getElementById('dropzone').style.display='';
  }
  function doSubmit(){
    document.getElementById('submitBody').innerHTML=`
      <div class="submit-success">
        <div class="ok-ic"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
        <h3>제출 완료!</h3>
        <p>결과물이 제출됐어요.<br>이제 <b>팀장의 검수</b>를 기다리면 돼요. 결과는 알림으로 알려드릴게요.</p>
        <button class="btn pri" style="margin-top:20px" onclick="closeSubmit()">확인</button>
      </div>`;
  }
  window.openSubmit=openSubmit; window.closeSubmit=closeSubmit;
  window.pickFile=pickFile; window.removeFile=removeFile; window.doSubmit=doSubmit;
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSubmit();});

  // ----- 댓글 등록 -----
  function addComment(){
    const ta=document.getElementById('cmtInput');
    const txt=ta.value.trim(); if(!txt)return;
    const form=ta.closest('.cmt-form');
    const el=document.createElement('div');
    el.className='cmt';
    el.innerHTML=`<div class="pic" style="background:linear-gradient(135deg,#2b46c8,#5b45c8)">민</div>
      <div class="body"><div class="nm">김민재 <span>컴퓨터공학 · 4학년 · 방금</span></div><p></p></div>`;
    el.querySelector('p').textContent=txt;
    form.parentNode.insertBefore(el,form);
    ta.value='';
    // 댓글 수 +1
    const cnt=document.querySelector('#v-detail .panel h5 .mono');
    if(cnt) cnt.textContent=parseInt(cnt.textContent||'0',10)+1;
  }
  window.addComment=addComment;

  // ----- 프로젝트 완료 -----
  function pickFinal(){
    document.getElementById('finalDrop').style.display='none';
    document.getElementById('finalFileWrap').innerHTML=`
      <div class="final-file">
        <span class="fi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
        <div class="fmeta"><div class="fn">final_deliverable.zip</div><div class="fs">8.7MB</div></div>
        <span class="rm" onclick="removeFinal()" title="제거"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></span>
      </div>`;
  }
  function removeFinal(){
    document.getElementById('finalFileWrap').innerHTML='';
    document.getElementById('finalDrop').style.display='';
  }
  function completeProject(){
    document.getElementById('completeBody').innerHTML=`
      <div class="complete-done">
        <div class="big-ic"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
        <h2>프로젝트를 완료했어요! 🎉</h2>
        <p>AI 헬스케어 웹서비스가 완료 처리됐어요. 최종 결과물과 팀원별 기여도가 <b>포트폴리오</b>에 기록됐고, 팀원 전원에게 알림이 전송됐어요.</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:22px">
          <button class="btn ghost" onclick="go('results')">결과물 보기</button>
          <button class="btn pri" onclick="go('mypage')">마이페이지로</button>
        </div>
      </div>`;
    window.scrollTo({top:0,behavior:'smooth'});
  }
  window.pickFinal=pickFinal; window.removeFinal=removeFinal; window.completeProject=completeProject;
</script>
</body>
</html>
